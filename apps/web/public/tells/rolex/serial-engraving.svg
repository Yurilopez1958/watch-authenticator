<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220" role="img" aria-label="Serial engraving: genuine sharp diamond-cut vs replica sandblasted/etched">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a3550"/><stop offset="100%" stop-color="#161e33"/></linearGradient>
    <filter id="seblur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.4"/></filter>
    <filter id="frost" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.62  0 0 0 0 0.67  0 0 0 0 0.74  0 0 0 0.6 0"/>
    </filter>
    <clipPath id="plR"><rect x="244" y="86" width="142" height="58" rx="8"/></clipPath>
  </defs>
  <rect x="1" y="1" width="418" height="218" rx="14" fill="#0e1530" stroke="#27314f"/>
  <line x1="210" y1="22" x2="210" y2="198" stroke="#27314f" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- GENUINE: deep, faceted, light-catching -->
  <text x="105" y="38" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="14.5" font-weight="700" fill="#34d399">&#10003; tallado a diamante / diamond-cut</text>
  <rect x="34" y="86" width="142" height="58" rx="8" fill="url(#plate)" stroke="#3a4a6b"/>
  <text x="106" y="124" text-anchor="middle" font-family="Consolas,Menlo,monospace" font-size="28" font-weight="700" letter-spacing="3" fill="#0a1020">49628</text>
  <text x="105" y="123" text-anchor="middle" font-family="Consolas,Menlo,monospace" font-size="28" font-weight="700" letter-spacing="3" fill="#eef3fb">49628</text>
  <text x="160" y="104" font-size="15" fill="#bfe3ff">&#10022;</text>

  <!-- REPLICA: shallow, frosted, sandblasted -->
  <text x="315" y="38" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="14.5" font-weight="700" fill="#f87171">&#10007; arenado / sandblasted</text>
  <rect x="244" y="86" width="142" height="58" rx="8" fill="url(#plate)" stroke="#3a4a6b"/>
  <text x="315" y="124" text-anchor="middle" font-family="Consolas,Menlo,monospace" font-size="28" font-weight="700" letter-spacing="3" fill="#8b97ab" filter="url(#seblur)">49628</text>
  <rect x="244" y="86" width="142" height="58" clip-path="url(#plR)" filter="url(#frost)" opacity="0.5"/>

  <text x="210" y="212" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="11" fill="#64748b">serial &#183; faceted &amp; sharp / facetado y nítido (lupa)</text>
</svg>
