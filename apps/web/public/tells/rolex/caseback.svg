<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220" role="img" aria-label="Case back: genuine solid screw-down vs replica see-through display back">
  <rect x="1" y="1" width="418" height="218" rx="14" fill="#0e1530" stroke="#27314f"/>
  <line x1="210" y1="22" x2="210" y2="198" stroke="#27314f" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- GENUINE: solid screw-down back -->
  <g font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif">
    <text x="105" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#34d399">&#10003; macizo / solid</text>
    <circle cx="105" cy="122" r="60" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="4 5"/>
    <circle cx="105" cy="122" r="50" fill="#0b1228" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="105" cy="122" r="34" fill="none" stroke="#2b3658" stroke-width="1.5"/>
  </g>

  <!-- REPLICA: display (see-through) back = suspicious on standard Rolex -->
  <g font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif">
    <text x="315" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#f87171">&#10007; cristal / display</text>
    <circle cx="315" cy="122" r="56" fill="#070d20" stroke="#f87171" stroke-width="2.5"/>
    <!-- schematic visible movement through glass -->
    <path d="M275 122 a40 40 0 0 1 80 0" fill="none" stroke="#64748b" stroke-width="6"/>
    <circle cx="315" cy="122" r="40" fill="none" stroke="#2b3658" stroke-width="1.5"/>
    <circle cx="300" cy="132" r="9" fill="none" stroke="#64748b" stroke-width="2"/>
    <circle cx="330" cy="126" r="6" fill="none" stroke="#64748b" stroke-width="2"/>
    <circle cx="313" cy="146" r="5" fill="none" stroke="#64748b" stroke-width="2"/>
  </g>

  <text x="210" y="212" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="11" fill="#64748b">Rolex: fondo macizo, no transparente / solid, not display</text>
</svg>
