<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220" role="img" aria-label="Dial printing: genuine crisp text vs replica fuzzy ink-bleed under a loupe">
  <defs>
    <filter id="bleed" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="418" height="218" rx="14" fill="#0e1530" stroke="#27314f"/>
  <line x1="210" y1="22" x2="210" y2="198" stroke="#27314f" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- GENUINE: crisp -->
  <g font-family="Georgia,Times New Roman,serif">
    <text x="105" y="38" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" fill="#34d399">&#10003; nítida / crisp</text>
    <circle cx="105" cy="124" r="56" fill="#070d20" stroke="#7dd3fc" stroke-width="2.5"/>
    <text x="105" y="150" text-anchor="middle" font-size="74" font-weight="700" fill="#f4f4f5">Aa</text>
  </g>

  <!-- REPLICA: fuzzy + ink bleed -->
  <g font-family="Georgia,Times New Roman,serif">
    <text x="315" y="38" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" fill="#f87171">&#10007; borrosa / fuzzy</text>
    <circle cx="315" cy="124" r="56" fill="#070d20" stroke="#64748b" stroke-width="2.5"/>
    <g filter="url(#bleed)">
      <text x="317" y="151" text-anchor="middle" font-size="74" font-weight="700" fill="#cbd5e1" fill-opacity="0.85">Aa</text>
      <text x="313" y="149" text-anchor="middle" font-size="74" font-weight="700" fill="#cbd5e1" fill-opacity="0.55">Aa</text>
    </g>
  </g>

  <text x="210" y="212" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="11" fill="#64748b">printing edges / bordes de impresión (loupe / lupa)</text>
</svg>
