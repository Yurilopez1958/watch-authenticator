<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220" role="img" aria-label="Cartier signed deployant clasp: genuine deep crisp signature vs replica shallow">
  <defs>
    <linearGradient id="clasp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#cdd6e2"/><stop offset="50%" stop-color="#97a3b5"/><stop offset="100%" stop-color="#5f6a7c"/></linearGradient>
    <filter id="clblur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.4"/></filter>
    <filter id="clfrost" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.6  0 0 0 0 0.68  0 0 0 0.5 0"/>
    </filter>
    <clipPath id="clR"><rect x="252" y="92" width="126" height="50" rx="10"/></clipPath>
  </defs>
  <rect x="1" y="1" width="418" height="218" rx="14" fill="#0e1530" stroke="#27314f"/>
  <line x1="210" y1="22" x2="210" y2="198" stroke="#27314f" stroke-width="1.5" stroke-dasharray="5 5"/>

  <text x="105" y="40" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#34d399">&#10003; firma profunda / deep</text>
  <rect x="42" y="92" width="126" height="50" rx="10" fill="url(#clasp)" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="105" y="124" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="22" font-style="italic" font-weight="700" fill="#0c1424">Cartier</text>
  <text x="104" y="123" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="22" font-style="italic" font-weight="700" fill="#f2f6fc" opacity="0.55">Cartier</text>

  <text x="315" y="40" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#f87171">&#10007; superficial / shallow</text>
  <rect x="252" y="92" width="126" height="50" rx="10" fill="url(#clasp)" stroke="#aeb7c6" stroke-width="1.5"/>
  <text x="315" y="124" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="22" font-style="italic" font-weight="700" fill="#7a8699" filter="url(#clblur)">Cartier</text>
  <rect x="252" y="92" width="126" height="50" clip-path="url(#clR)" filter="url(#clfrost)" opacity="0.4"/>

  <text x="210" y="178" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="11" fill="#64748b">signed folding clasp / cierre desplegable firmado</text>
</svg>
