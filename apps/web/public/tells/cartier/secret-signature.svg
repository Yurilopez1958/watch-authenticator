<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220" role="img" aria-label="Cartier secret signature hidden in a Roman numeral under a loupe">
  <rect x="1" y="1" width="418" height="218" rx="14" fill="#0e1530" stroke="#27314f"/>
  <line x1="210" y1="22" x2="210" y2="198" stroke="#27314f" stroke-width="1.5" stroke-dasharray="5 5"/>

  <text x="105" y="36" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#34d399">&#10003; firma oculta / hidden</text>
  <text x="95" y="150" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="62" font-weight="600" fill="#cdd5e1">VII</text>
  <circle cx="118" cy="118" r="27" fill="#070d20" fill-opacity="0.55" stroke="#7dd3fc" stroke-width="2.5"/>
  <text x="118" y="121" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="10" font-style="italic" fill="#9fe0ff">Cartier</text>
  <line x1="138" y1="138" x2="150" y2="150" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round"/>

  <text x="315" y="36" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#f87171">&#10007; sin firma / none</text>
  <text x="305" y="150" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="62" font-weight="600" fill="#cdd5e1">VII</text>
  <circle cx="328" cy="118" r="27" fill="#070d20" fill-opacity="0.55" stroke="#64748b" stroke-width="2.5"/>
  <line x1="348" y1="138" x2="360" y2="150" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>

  <text x="210" y="212" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="11" fill="#64748b">secret signature in a numeral / firma secreta en un numeral</text>
</svg>
