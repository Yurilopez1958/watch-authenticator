    <g stroke="#5b6577" stroke-width="1"><line x1="64" y1="114" x2="64" y2="130"/><line x1="56" y1="122" x2="72" y2="122"/><line x1="58.5" y1="116.5" x2="69.5" y2="127.5"/><line x1="69.5" y1="116.5" x2="58.5" y2="127.5"/></g>
  </g>
