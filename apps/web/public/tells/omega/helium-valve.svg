  <rect x="1" y="1" width="418" height="218" rx="14" fill="#0e1530" stroke="#27314f"/>
  <line x1="210" y1="22" x2="210" y2="198" stroke="#27314f" stroke-width="1.5" stroke-dasharray="5 5"/>

  <text x="105" y="34" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#34d399">&#10003; mecanizada / machined</text>
  <circle cx="112" cy="122" r="50" fill="#0b1b2e" stroke="#9aa6b8" stroke-width="2.5"/>
  <circle cx="112" cy="122" r="34" fill="none" stroke="#2b3658" stroke-width="1.5"/>
  <g transform="rotate(-45 112 122)">
