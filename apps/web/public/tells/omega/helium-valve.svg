  <text x="315" y="34" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#f87171">&#10007; falsa / plana</text>
  <circle cx="322" cy="122" r="50" fill="#0b1b2e" stroke="#7f8a9c" stroke-width="2.5"/>
