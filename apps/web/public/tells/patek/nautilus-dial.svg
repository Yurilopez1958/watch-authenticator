    <clipPath id="ndR"><rect x="256" y="72" width="118" height="100" rx="10"/></clipPath>
    <filter id="nblur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.5"/></filter>
