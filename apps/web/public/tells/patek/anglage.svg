<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220" role="img" aria-label="Anglage: genuine polished bevelled bridge edge vs replica flat stamped edge">
  <defs>
    <linearGradient id="bevel" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#eef3fb"/><stop offset="55%" stop-color="#aab6c8"/><stop offset="100%" stop-color="#6b7689"/></linearGradient>
    <linearGradient id="brdg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#caa24a"/><stop offset="100%" stop-color="#8a6f2c"/></linearGradient>
    <filter id="anblur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.3"/></filter>
  </defs>
  <rect x="1" y="1" width="418" height="218" rx="14" fill="#0e1530" stroke="#27314f"/>
  <line x1="210" y1="22" x2="210" y2="198" stroke="#27314f" stroke-width="1.5" stroke-dasharray="5 5"/>

  <text x="105" y="36" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#34d399">&#10003; biselado pulido / bevel</text>
  <path d="M44 150 L160 150 L160 96 L66 96 L44 118 Z" fill="url(#brdg)" stroke="#6b531f"/>
  <polygon points="66,96 44,118 56,128 78,106" fill="url(#bevel)" stroke="#e9eef6" stroke-width="1"/>
  <line x1="69" y1="100" x2="49" y2="120" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
  <text x="40" y="172" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="10" fill="#9fb0c8">corte del puente / bridge edge</text>

  <text x="315" y="36" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#f87171">&#10007; canto plano / flat</text>
  <g filter="url(#anblur)">
    <path d="M254 150 L370 150 L370 96 L266 96 L266 118 L254 118 Z" fill="#7a6a3e" stroke="#54481f"/>
    <rect x="254" y="106" width="14" height="14" fill="#5b6577" opacity="0.5"/>
  </g>

  <text x="210" y="212" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="11" fill="#64748b">anglage &#183; polished bevel / chaflán pulido a mano</text>
</svg>
