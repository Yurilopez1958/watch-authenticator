<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220" role="img" aria-label="Case hallmark punch: genuine deep crisp vs replica shallow frosted">
  <defs>
    <linearGradient id="hmplate" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a3550"/><stop offset="100%" stop-color="#161e33"/></linearGradient>
    <filter id="hmblur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.3"/></filter>
    <filter id="hmfrost" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.62  0 0 0 0 0.67  0 0 0 0 0.74  0 0 0 0.55 0"/>
    </filter>
    <clipPath id="hmR"><rect x="246" y="80" width="138" height="78" rx="8"/></clipPath>
  </defs>
  <rect x="1" y="1" width="418" height="218" rx="14" fill="#0e1530" stroke="#27314f"/>
  <line x1="210" y1="22" x2="210" y2="198" stroke="#27314f" stroke-width="1.5" stroke-dasharray="5 5"/>

  <text x="105" y="36" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#34d399">&#10003; profundo / deep</text>
  <rect x="36" y="80" width="138" height="78" rx="8" fill="url(#hmplate)" stroke="#3a4a6b"/>
  <g transform="translate(105,119)">
    <path d="M0,-26 L20,-16 L20,10 Q0,28 0,28 Q-20,10 -20,10 L-20,-16 Z" fill="#0a1020" stroke="#e9eef6" stroke-width="2"/>
    <path d="M0,-21 L15,-13 L15,8 Q0,21 0,21 Q-15,8 -15,8 L-15,-13 Z" fill="none" stroke="#9fb0c8" stroke-width="1.2"/>
    <text x="0" y="4" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="700" fill="#cdd5e1">PP</text>
  </g>

  <text x="315" y="36" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#f87171">&#10007; superficial / shallow</text>
  <rect x="246" y="80" width="138" height="78" rx="8" fill="url(#hmplate)" stroke="#3a4a6b"/>
  <g transform="translate(315,119)" filter="url(#hmblur)">
    <path d="M0,-26 L20,-16 L20,10 Q0,28 0,28 Q-20,10 -20,10 L-20,-16 Z" fill="none" stroke="#7e8aa0" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="700" fill="#7e8aa0">PP</text>
  </g>
  <rect x="246" y="80" width="138" height="78" clip-path="url(#hmR)" filter="url(#hmfrost)" opacity="0.4"/>

  <text x="210" y="212" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,Arial,sans-serif" font-size="11" fill="#64748b">hallmark / punzón en la caja (lupa)</text>
</svg>
